<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiiMark Voice Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & Globals ─────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0A0A0F;
      --bg-secondary: #12121A;
      --bg-card: rgba(255,255,255,0.03);
      --bg-card-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.06);
      --border-active: rgba(255,90,35,0.4);
      --text-primary: #F5F5F7;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
      --orange: #FF5A23;
      --orange-glow: rgba(255,90,35,0.25);
      --green: #34D399;
      --green-glow: rgba(52,211,153,0.2);
      --red: #EF4444;
      --red-glow: rgba(239,68,68,0.2);
      --blue: #60A5FA;
      --yellow: #FBBF24;
      --font-body: 'Inter', -apple-system, sans-serif;
      --font-heading: 'Poppins', sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ─── Animated background ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(255,90,35,0.06), transparent),
        radial-gradient(ellipse 500px 500px at 80% 80%, rgba(96,165,250,0.04), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ─────────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--orange), #FF8A50);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }

    .header h1 {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: var(--text-secondary);
      font-weight: 400;
      font-family: var(--font-body);
      font-size: 14px;
      margin-left: 8px;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.3s;
    }

    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
    .status-dot.active { background: var(--orange); box-shadow: 0 0 8px var(--orange-glow); animation: pulse 1.5s ease infinite; }
    .status-dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    /* ─── Main layout ────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 32px;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; padding: 16px; }
    }

    /* ─── Left panel: Voice control ──────────────────────────────────── */
    .voice-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      min-height: 500px;
    }

    /* ─── Orb ─────────────────────────────────────────────────────────── */
    .orb-container {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 40px;
    }

    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.06) 0%, transparent 60%),
                  linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
    }

    .orb::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      padding: 2px;
      background: conic-gradient(from 0deg, transparent 60%, var(--orange) 80%, transparent 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .orb.active {
      border-color: var(--border-active);
      box-shadow:
        0 0 60px var(--orange-glow),
        0 0 120px rgba(255,90,35,0.08),
        inset 0 0 40px rgba(255,90,35,0.05);
    }

    .orb.active::after {
      opacity: 1;
      animation: spin 3s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .orb-icon {
      font-size: 48px;
      opacity: 0.4;
      transition: all 0.3s;
    }

    .orb.active .orb-icon {
      opacity: 1;
      filter: drop-shadow(0 0 12px var(--orange-glow));
    }

    /* ─── Waveform visualizer ──────────────────────────────────────── */
    .waveform {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .orb.active .waveform { opacity: 1; }

    .waveform-bar {
      width: 3px;
      height: 20px;
      background: var(--orange);
      border-radius: 3px;
      animation: wave 1.2s ease-in-out infinite;
    }

    .waveform-bar:nth-child(1) { animation-delay: 0s; }
    .waveform-bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
    .waveform-bar:nth-child(3) { animation-delay: 0.2s; height: 40px; }
    .waveform-bar:nth-child(4) { animation-delay: 0.3s; height: 35px; }
    .waveform-bar:nth-child(5) { animation-delay: 0.15s; height: 25px; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    .orb-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }

    .agent-name {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .agent-model {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ─── Call button ──────────────────────────────────────────────── */
    .call-btn {
      border: none;
      padding: 14px 40px;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .call-btn.start {
      background: linear-gradient(135deg, var(--orange), #FF7A45);
      color: white;
      box-shadow: 0 4px 24px var(--orange-glow);
    }

    .call-btn.start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255,90,35,0.35);
    }

    .call-btn.end {
      background: rgba(239,68,68,0.12);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .call-btn.end:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.4);
    }

    .call-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ─── Info cards row ──────────────────────────────────────────── */
    .info-row {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      width: 100%;
      max-width: 420px;
    }

    .info-chip {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      text-align: center;
    }

    .info-chip .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .info-chip .value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .info-chip .value.green { color: var(--green); }
    .info-chip .value.orange { color: var(--orange); }

    /* ─── Right panel: Transcript ─────────────────────────────────── */
    .transcript-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 80px);
      position: sticky;
      top: 80px;
    }

    .transcript-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .transcript-header h2 {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 600;
    }

    .transcript-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .transcript-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      scroll-behavior: smooth;
    }

    .transcript-body::-webkit-scrollbar { width: 4px; }
    .transcript-body::-webkit-scrollbar-track { background: transparent; }
    .transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .transcript-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      gap: 8px;
    }

    .transcript-empty span { font-size: 32px; }

    /* ─── Message bubbles ──────────────────────────────────────────── */
    .msg {
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-role {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .msg-role.user { color: var(--blue); }
    .msg-role.assistant { color: var(--orange); }

    .msg-role-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .msg-role.user .msg-role-dot { background: var(--blue); }
    .msg-role.assistant .msg-role-dot { background: var(--orange); }

    .msg-text {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-secondary);
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .msg-role.assistant + .msg-text {
      background: rgba(255,90,35,0.04);
      border-color: rgba(255,90,35,0.1);
    }

    /* ─── Tool call cards ──────────────────────────────────────────── */
    .tool-msg {
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(251,191,36,0.04);
      border: 1px solid rgba(251,191,36,0.12);
      border-radius: var(--radius-sm);
      animation: fadeIn 0.3s ease;
    }

    .tool-msg .tool-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--yellow);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tool-msg .tool-result {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ─── Status messages ──────────────────────────────────────────── */
    .status-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 0;
      margin-bottom: 12px;
      animation: fadeIn 0.3s ease;
    }

    /* ─── Timer ──────────────────────────────────────────────────────── */
    .timer {
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .timer.visible { opacity: 1; }

    /* ─── Error banner ───────────────────────────────────────────────── */
    .error-banner {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      backdrop-filter: blur(16px);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--red);
      z-index: 200;
      animation: slideUp 0.4s ease;
      max-width: 90%;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">D</div>
      <h1>DigiiMark Voice Agent <span>Test Console</span></h1>
    </div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- Main layout -->
  <main class="main">
    <!-- Left: Voice control -->
    <section class="voice-panel">
      <div class="orb-container">
        <div class="orb" id="orb">
          <div class="waveform">
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
          </div>
          <div class="orb-icon" id="orbIcon">🎙️</div>
        </div>
      </div>

      <div class="agent-name" id="agentName">Maya</div>
      <div class="agent-model" id="agentModel">Gemini 2.0 Flash Live</div>

      <button class="call-btn start" id="callBtn" onclick="toggleCall()">
        <span>🎤</span> Start Call
      </button>

      <div class="timer" id="timer">00:00</div>

      <div class="info-row">
        <div class="info-chip">
          <div class="label">Knowledge</div>
          <div class="value green" id="chunkCount">—</div>
        </div>
        <div class="info-chip">
          <div class="label">Tools</div>
          <div class="value orange" id="toolCount">—</div>
        </div>
        <div class="info-chip">
          <div class="label">Call ID</div>
          <div class="value" id="callIdDisplay" style="font-size:11px">—</div>
        </div>
      </div>
    </section>

    <!-- Right: Transcript -->
    <section class="transcript-panel">
      <div class="transcript-header">
        <h2>Live Transcript</h2>
        <div class="transcript-count" id="turnCount">0 turns</div>
      </div>
      <div class="transcript-body" id="transcriptBody">
        <div class="transcript-empty">
          <span>💬</span>
          Press "Start Call" to begin talking with the agent.
        </div>
      </div>
    </section>
  </main>

  <script>
    // ─── State ──────────────────────────────────────────────────────
    let ws = null;
    let audioContext = null;
    let micStream = null;
    let micProcessor = null;
    let callActive = false;
    let timerInterval = null;
    let callStart = null;
    let turnCount = 0;

    // Audio playback queue
    let playQueue = [];
    let isPlaying = false;

    const $ = (sel) => document.querySelector(sel);

    // ─── Fetch health on load ───────────────────────────────────────
    fetch('/api/health')
      .then(r => r.json())
      .then(d => {
        $('#agentName').textContent = d.agent || 'Maya';
        $('#agentModel').textContent = d.model || 'Gemini Live';
        $('#chunkCount').textContent = d.knowledge_chunks ?? '—';
        $('#toolCount').textContent = d.tools?.length ?? '—';
        setStatus('ready', 'Ready');
      })
      .catch(() => setStatus('error', 'Server offline'));

    // ─── UI helpers ─────────────────────────────────────────────────
    function setStatus(state, text) {
      const dot = $('#statusDot');
      dot.className = 'status-dot';
      if (state === 'connected' || state === 'ready') dot.classList.add('connected');
      if (state === 'active') dot.classList.add('active');
      if (state === 'error') dot.classList.add('error');
      $('#statusText').textContent = text;
    }

    function addTranscriptMsg(role, text) {
      const body = $('#transcriptBody');
      // Clear empty state
      const empty = body.querySelector('.transcript-empty');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `
        <div class="msg-role ${role}">
          <div class="msg-role-dot"></div>
          ${role === 'user' ? 'You' : ($('#agentName') ? $('#agentName').textContent : 'Maya')}
        </div>
        <div class="msg-text">${escapeHtml(text)}</div>
      `;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;

      turnCount++;
      $('#turnCount').textContent = turnCount + ' turn' + (turnCount !== 1 ? 's' : '');
    }

    function addToolCall(tool, args, result) {
      const body = $('#transcriptBody');
      const div = document.createElement('div');
      div.className = 'tool-msg';
      div.innerHTML = `
        <div class="tool-name">🔧 ${escapeHtml(tool)}</div>
        <div class="tool-result">${escapeHtml(result?.message || JSON.stringify(result))}</div>
      `;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    function addStatusMsg(text) {
      const body = $('#transcriptBody');
      const empty = body.querySelector('.transcript-empty');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = 'status-msg';
      div.textContent = text;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    function showError(msg) {
      const existing = document.querySelector('.error-banner');
      if (existing) existing.remove();

      const div = document.createElement('div');
      div.className = 'error-banner';
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 6000);
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function updateTimer() {
      if (!callStart) return;
      const seconds = Math.floor((Date.now() - callStart) / 1000);
      const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
      const ss = String(seconds % 60).padStart(2, '0');
      $('#timer').textContent = `${mm}:${ss}`;
    }

    // ─── Toggle call ────────────────────────────────────────────────
    async function toggleCall() {
      if (callActive) {
        endCall();
      } else {
        await startCall();
      }
    }

    // ─── Start call ─────────────────────────────────────────────────
    async function startCall() {
      const btn = $('#callBtn');
      btn.disabled = true;

      try {
        // Get mic access
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 16000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
          }
        });

        // Create AudioContext for mic processing
        audioContext = new AudioContext({ sampleRate: 16000 });
        const source = audioContext.createMediaStreamSource(micStream);

        // 3.1 NEW: AudioWorklet for raw PCM (replaces deprecated ScriptProcessor)
        console.log('Registering AudioWorklet: /static/audio-processor.js');
        await audioContext.audioWorklet.addModule('/static/audio-processor.js');
        micProcessor = new AudioWorkletNode(audioContext, 'pcm-processor');
        
        micProcessor.port.onmessage = (e) => {
          if (!callActive || !ws || ws.readyState !== WebSocket.OPEN) return;
          // Send raw PCM bytes directly to WebSocket
          ws.send(e.data);
        };
        
        source.connect(micProcessor);
        micProcessor.connect(audioContext.destination);
        console.log('AudioWorklet connected.');

        // Open WebSocket
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws/voice`);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
          console.log('WebSocket connected to voice agent.');
          callActive = true;
          setStatus('active', 'In Call');
          btn.disabled = false;
          btn.className = 'call-btn end';
          btn.innerHTML = '<span>📞</span> End Call';
          $('#orb').classList.add('active');
          $('#orbIcon').style.display = 'none';
          $('#timer').classList.add('visible');

          callStart = Date.now();
          timerInterval = setInterval(updateTimer, 1000);
        };

        ws.onmessage = (event) => {
          // Binary = audio from Gemini
          if (event.data instanceof ArrayBuffer) {
            playAudioChunk(event.data);
            return;
          }

          // Text = JSON messages
          try {
            const msg = JSON.parse(event.data);

            if (msg.type === 'transcript') {
              addTranscriptMsg(msg.role, msg.text);
            } else if (msg.type === 'tool_call') {
              addToolCall(msg.tool, msg.args, msg.result);
            } else if (msg.type === 'status') {
              addStatusMsg(msg.message);
            } else if (msg.type === 'call_started') {
              $('#callIdDisplay').textContent = msg.call_id || '—';
            } else if (msg.type === 'call_ended') {
              addStatusMsg(`Call ended. Transcript saved.`);
            } else if (msg.type === 'error') {
              showError(msg.message);
            }
          } catch (e) {
            console.warn('WS message parse error:', e);
          }
        };

        ws.onerror = (e) => {
          console.error('WebSocket error:', e);
          showError('WebSocket connection error');
        };
        ws.onclose = (e) => {
          console.warn('WebSocket closed. Code:', e.code, 'Reason:', e.reason);
          if (callActive) endCall();
        };

      } catch (err) {
        btn.disabled = false;
        if (err.name === 'NotAllowedError') {
          showError('Microphone access denied. Please allow microphone permissions.');
        } else {
          showError('Error starting call: ' + err.message);
        }
      }
    }

    // ─── End call ───────────────────────────────────────────────────
    function endCall() {
      callActive = false;

      // Send end signal
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'control', action: 'end_call' }));
        setTimeout(() => ws.close(), 500);
      }

      // Stop mic
      if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
      }
      if (micProcessor) {
        micProcessor.disconnect();
        micProcessor = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      // Stop timer
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      // Update UI
      setStatus('connected', 'Call Ended');
      const btn = $('#callBtn');
      btn.className = 'call-btn start';
      btn.innerHTML = '<span>🎤</span> Start Call';
      btn.disabled = false;
      $('#orb').classList.remove('active');
      $('#orbIcon').style.display = '';

      // Reset for next call
      turnCount = 0;
    }

    // ─── Audio playback ─────────────────────────────────────────────
    const playbackCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });

    function playAudioChunk(arrayBuffer) {
      playQueue.push(arrayBuffer);
      if (!isPlaying) drainPlayQueue();
    }

    async function drainPlayQueue() {
      isPlaying = true;

      while (playQueue.length > 0) {
        const buffer = playQueue.shift();
        const int16 = new Int16Array(buffer);
        const float32 = new Float32Array(int16.length);

        for (let i = 0; i < int16.length; i++) {
          float32[i] = int16[i] / 32768;
        }

        const audioBuffer = playbackCtx.createBuffer(1, float32.length, 24000);
        audioBuffer.getChannelData(0).set(float32);

        const source = playbackCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(playbackCtx.destination);
        source.start();

        // Wait for this chunk to finish before playing next
        await new Promise(r => {
          source.onended = r;
          // Fallback timeout
          setTimeout(r, (float32.length / 24000) * 1000 + 50);
        });
      }

      isPlaying = false;
    }

    // PCM format handled background in AudioWorklet (/static/audio-processor.js)
  </script>
</body>
</html>
